<!doctype html>
<html lang="en">

<head>
  <!-- Basic -->
  <meta charset="UTF-8" />

  <!-- Mobile Optimization -->
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />

  <!-- Title -->
  <title>Stacks – Web Design & Development Agency</title>

  <!-- SEO -->
  <meta name="description"
    content="Stacks is a leading web design and development agency offering UI/UX, web apps, Shopify, WordPress, SEO, and branding solutions to help businesses grow online." />

  <!-- Theme Color -->
  <meta name="theme-color" content="#0e0f11">

  <!-- Open Graph (Social Sharing) -->
  <meta property="og:title" content="Stacks – Web Design & Development Agency" />
  <meta property="og:description"
    content="We design and develop high-performance websites, apps, and digital experiences for modern brands. 550+ clients trust Stacks." />
  <meta property="og:image" content="https://stacks-design-development.vercel.app/Images/preview.webp" />
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="630">
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://stacks-design-development.vercel.app/" />

  <!-- Twitter -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Stacks – Web Design & Development Agency">
  <meta name="twitter:description"
    content="We design and develop high-performance websites, apps, and digital experiences for modern brands.">
  <meta name="twitter:image" content="https://stacks-design-development.vercel.app/Images/preview.webp">

  <!-- Canonical URL -->
  <link rel="canonical" href="https://stacks-design-development.vercel.app/" />

  <!-- Favicon (unchanged as you said) -->
  <link rel="icon" type="image/png" href="/Images/Extras/favicon.png" />

  <!-- Preconnect (Fonts Performance) -->
   <noscript>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  </noscript>

  <!-- Hero Image Preload (LCP Boost) -->
  <link rel="preload" as="image" href="/Images/Hero/hero-bg.webp" fetchpriority="high">

</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>

</html>
